# Learning Paths — Cross-Topic Curricula
# Defines ordered sequences of topics forming structured study paths.

paths:
  full_stack_developer:
    label:
      en: "Full Stack Developer"
      ko: "풀스택 개발자"
    description:
      en: "Build modern web applications from frontend to backend, including databases, APIs, and deployment."
      ko: "프론트엔드부터 백엔드까지 데이터베이스, API, 배포를 포함한 현대 웹 애플리케이션 구축."
    icon: "code"
    color: "#0d6efd"
    topics:
      - Programming
      - Python
      - Web_Development
      - Git
      - Docker
      - PostgreSQL
      - Backend_Frameworks
      - Frontend_Frameworks
      - GraphQL
      - API_Design
      - Testing_and_QA
      - DevOps
      - Cloud_Computing
      - System_Design

  ml_engineer:
    label:
      en: "Machine Learning Engineer"
      ko: "머신러닝 엔지니어"
    description:
      en: "From data fundamentals to production ML systems, covering classical ML, deep learning, and MLOps."
      ko: "데이터 기초부터 프로덕션 ML 시스템까지, 고전 ML, 딥러닝, MLOps를 포함."
    icon: "dashboard"
    color: "#198754"
    topics:
      - Programming
      - Python
      - Data_Science
      - Machine_Learning
      - Math_for_AI
      - Deep_Learning
      - Computer_Vision
      - LLM_and_NLP
      - Foundation_Models
      - Reinforcement_Learning
      - MLOps
      - Linear_Algebra
      - Edge_AI

  systems_programmer:
    label:
      en: "Systems Programmer"
      ko: "시스템 프로그래머"
    description:
      en: "Master low-level programming, operating systems, compilers, and performance-critical code."
      ko: "저수준 프로그래밍, 운영체제, 컴파일러, 성능 핵심 코드 마스터."
    icon: "code"
    color: "#fd7e14"
    topics:
      - Programming
      - C_Programming
      - CPP
      - Rust
      - Linux
      - Shell_Script
      - OS_Theory
      - Computer_Architecture
      - Compiler_Design
      - Algorithm

  space_physics:
    label:
      en: "Space Physics Specialist"
      ko: "우주물리학 전문가"
    description:
      en: "From mathematical foundations through plasma physics to space weather forecasting."
      ko: "수학적 기초부터 플라즈마 물리학, 우주기상 예보까지."
    icon: "circle"
    color: "#dc3545"
    topics:
      - Calculus_and_Differential_Equations
      - Mathematical_Methods
      - Electrodynamics
      - Numerical_Simulation
      - Plasma_Physics
      - MHD
      - Solar_Physics
      - Space_Weather

  cs_foundations:
    label:
      en: "Computer Science Foundations"
      ko: "컴퓨터 과학 기초"
    description:
      en: "Core CS theory covering algorithms, formal languages, operating systems, networking, and security."
      ko: "알고리즘, 형식 언어, 운영체제, 네트워킹, 보안을 포함하는 핵심 CS 이론."
    icon: "list"
    color: "#6f42c1"
    topics:
      - Programming
      - Python
      - Algorithm
      - Formal_Languages
      - Database_Theory
      - OS_Theory
      - Networking
      - Computer_Architecture
      - Software_Engineering
      - Testing_and_QA
      - Security

  cybersecurity:
    label:
      en: "Cybersecurity Engineer"
      ko: "사이버보안 엔지니어"
    description:
      en: "Security fundamentals to advanced penetration testing and defense"
      ko: "보안 기초부터 고급 침투 테스트 및 방어까지"
    icon: "link"
    color: "#20c997"
    topics:
      - Linux
      - Networking
      - Security
      - Cryptography_Theory
      - Shell_Script
      - Docker
      - Cloud_Computing

  embedded_iot:
    label:
      en: "Embedded & IoT Engineer"
      ko: "임베디드 & IoT 엔지니어"
    description:
      en: "From C programming to embedded systems and IoT"
      ko: "C 프로그래밍부터 임베디드 시스템과 IoT까지"
    icon: "graph"
    color: "#e83e8c"
    topics:
      - C_Programming
      - Computer_Architecture
      - OS_Theory
      - IoT_Embedded
      - Networking
      - Control_Theory
      - Signal_Processing
      - Edge_AI

  data_infrastructure:
    label:
      en: "Data Infrastructure Engineer"
      ko: "데이터 인프라 엔지니어"
    description:
      en: "Build scalable data platforms from databases to pipelines"
      ko: "데이터베이스에서 파이프라인까지 확장 가능한 데이터 플랫폼 구축"
    icon: "dashboard"
    color: "#0dcaf0"
    topics:
      - Python
      - PostgreSQL
      - Database_Theory
      - Data_Engineering
      - Docker
      - Cloud_Computing
      - System_Design

  scientific_computing:
    label:
      en: "Scientific Computing Specialist"
      ko: "과학 계산 전문가"
    description:
      en: "Mathematical foundations to numerical simulation and HPC"
      ko: "수학 기초부터 수치 시뮬레이션과 고성능 컴퓨팅까지"
    icon: "path"
    color: "#6610f2"
    topics:
      - Python
      - Calculus_and_Differential_Equations
      - Probability_and_Statistics
      - Mathematical_Methods
      - Linear_Algebra
      - Numerical_Simulation
      - Signal_Processing
      - Data_Science
